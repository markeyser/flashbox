site_name: Flashbox
site_description: A dynamic, repository-aware persistent Docker sandbox CLI for AI Agents.
site_url: https://your_domain.com/flashbox

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - toc.follow
  palette:
    scheme: slate
    primary: black
    accent: green

extra_css:
  - assets/theme.css

repo_name: Flashbox
repo_url: https://github.com/markeyser/flashbox

nav:
  - Home: index.md
  - Tutorials:
      - Getting Started: tutorials/getting-started.md
  - How-to Guides:
      - Mount Custom Vaults: how-to/setup-persistent-volumes.md
  - Reference:
      - CLI Commands: reference/cli-commands.md
  - Explanation:
      - Architecture Philosophy: explanation/architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
